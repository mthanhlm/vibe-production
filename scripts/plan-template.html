<!doctype html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} — vibe plan</title>
<style>
  :root {
    --ground: #f6f7f4; --surface: #ffffff; --ink: #20261f; --muted: #5d675c;
    --faint: #8a948a; --accent: #196953; --accent-soft: #e3efe9;
    --warn: #8a5a17; --warn-soft: #f5ecdc; --line: #dde2d9; --code-bg: #eef1ea;
    --serif: "Charter", "Bitstream Charter", "Sitka Text", Cambria, Georgia, serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #131614; --surface: #1a1f1b; --ink: #dce2da; --muted: #93a093;
      --faint: #6d786d; --accent: #53bfa0; --accent-soft: #1d2f28;
      --warn: #d2a050; --warn-soft: #2d2618; --line: #2a322b; --code-bg: #20261f;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--ground); }
  body { font-family: var(--sans); color: var(--ink); line-height: 1.6; font-size: 16px; }
  .page { max-width: 72ch; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1.6rem; }
  .eyebrow { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }
  .lang-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 99px; overflow: hidden; background: var(--surface); }
  .lang-toggle button {
    font-family: var(--mono); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.05em;
    padding: 0.35rem 0.95rem; border: none; background: transparent; color: var(--muted); cursor: pointer;
  }
  .lang-toggle button:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  html[data-lang="en"] .lang-toggle button[data-lang="en"],
  html[data-lang="vi"] .lang-toggle button[data-lang="vi"] { background: var(--accent); color: var(--ground); }

  h1 { font-family: var(--serif); font-size: clamp(1.7rem, 5vw, 2.2rem); line-height: 1.18; margin-bottom: 0.8rem; text-wrap: balance; }
  .chips { display: flex; flex-wrap: wrap; gap: 0.45rem; padding-bottom: 1.6rem; border-bottom: 1px solid var(--line); margin-bottom: 1.6rem; }
  .chip { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.06em; padding: 0.15rem 0.6rem; border-radius: 99px; background: var(--code-bg); color: var(--muted); }
  .chip.ok { background: var(--accent-soft); color: var(--accent); font-weight: 700; }

  .body h2 { font-family: var(--serif); font-size: 1.35rem; margin: 2.2rem 0 0.5rem; }
  .body h3 { font-family: var(--serif); font-size: 1.1rem; margin: 1.6rem 0 0.4rem; }
  .body p { margin: 0.7rem 0; }
  .body ul, .body ol { margin: 0.7rem 0; padding-left: 1.4rem; }
  .body li { margin: 0.4rem 0; }
  .body li::marker { color: var(--faint); }
  .body code { font-family: var(--mono); font-size: 0.85em; background: var(--code-bg); padding: 0.1em 0.35em; border-radius: 4px; }
  .body hr { border: none; border-top: 1px solid var(--line); margin: 1.8rem 0; }
  .body a { color: var(--accent); }
  li.check { list-style: none; margin-left: -1.4rem; padding-left: 0; }
  li.check .box { color: var(--accent); font-size: 1.05em; margin-right: 0.3rem; }
  li.check.done { color: var(--muted); }
  .missing { color: var(--warn); background: var(--warn-soft); border-radius: 8px; padding: 0.8rem 1rem; }

  html[data-lang="en"] .lang-vi { display: none; }
  html[data-lang="vi"] .lang-en { display: none; }

  .foot { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--line); font-family: var(--mono); font-size: 0.72rem; color: var(--faint); }
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <span class="eyebrow lang-en">vibe · plan</span>
      <span class="eyebrow lang-vi">vibe · kế hoạch</span>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" data-lang="en" onclick="setLang('en')">EN</button>
        <button type="button" data-lang="vi" onclick="setLang('vi')">VI</button>
      </div>
    </div>
    <h1>{{TITLE}}</h1>
    <div class="chips">{{CHIPS}}</div>
    <div class="body lang-en">
{{EN_HTML}}
    </div>
    <div class="body lang-vi">
<!--VIBE:VI:START-->
{{VI_HTML}}
<!--VIBE:VI:END-->
    </div>
    <p class="foot">rendered {{STAMP}} · .vibe/plan.md is the source of truth · re-render with <code>vibe-plan-html</code></p>
  </div>
  <script>
    function setLang(l) {
      document.documentElement.setAttribute('data-lang', l);
      try { localStorage.setItem('vibe-plan-lang', l); } catch (e) {}
    }
    try {
      var saved = localStorage.getItem('vibe-plan-lang');
      if (saved === 'en' || saved === 'vi') setLang(saved);
    } catch (e) {}
  </script>
</body>
</html>
